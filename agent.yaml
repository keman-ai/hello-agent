apiVersion: a2h/v2
kind: Agent

metadata:
  name: hello_agent
  version: 1.1.0
  displayName: Hello Agent
  description: A friendly greeter — says hello to whatever you describe.

runtime:
  type: claude-code
  entrypoint: run.sh
  timeout: 300

resources:
  cpu: 1
  memory: 1024
  disk: 2048

io:
  accepts: [text]
  produces: [text]

form:
  guide: |
    Tell the agent who or what you'd like to greet.
    For example: "my colleague who just got promoted" or "a rainy Monday morning".
  placeholder: "What do you want the agent to say hello to?"

egress: []
env: []
